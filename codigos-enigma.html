<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODIGOS ENIGMA</title>
<style>
* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    width: 100%;
    min-height: 100%;
}

body {
    min-height: 100vh;
    overflow: hidden;
    color: #eaf4ff;
    font-family: "Courier New", monospace;
    background:
        linear-gradient(rgba(3, 8, 12, 0.82), rgba(3, 8, 12, 0.88)),
        radial-gradient(circle at 50% 18%, rgba(255, 75, 58, 0.18), transparent 34%),
        radial-gradient(circle at 70% 62%, rgba(255, 145, 38, 0.12), transparent 30%),
        #03070b;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.045) 0,
            rgba(255,255,255,0.045) 1px,
            transparent 1px,
            transparent 5px
        );
    opacity: 0.18;
    mix-blend-mode: screen;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle at center, transparent 38%, rgba(0,0,0,0.78));
}

.enigma-shell {
    position: relative;
    z-index: 1;
    width: 100vw;
    height: 100vh;
    padding: clamp(30px, 3.2vh, 42px) 5vw 24px;
    border: 2px solid rgba(255, 61, 66, 0.7);
    box-shadow:
        inset 0 0 55px rgba(255, 54, 60, 0.12),
        0 0 28px rgba(255, 54, 60, 0.18);
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.top-bar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
}

h1 {
    margin: 0;
    color: #ff767c;
    font-size: clamp(28px, 4vw, 54px);
    letter-spacing: 2px;
    text-shadow:
        0 0 8px rgba(255, 82, 91, 0.72),
        0 0 20px rgba(255, 82, 91, 0.28);
}

.menu-link {
    border: 2px solid #ff4b51;
    background: rgba(25, 8, 10, 0.82);
    color: #ffcf6f;
    padding: 11px 15px;
    text-decoration: none;
    font-weight: bold;
    letter-spacing: 1px;
    box-shadow: 0 0 14px rgba(255, 75, 81, 0.32);
}

.menu-link:hover,
.menu-link:focus-visible {
    color: #03111d;
    background: #ffcf6f;
    outline: none;
}

.hud {
    display: grid;
    grid-template-columns: 150px 1fr 150px;
    align-items: center;
    gap: 18px;
}

.hud-value {
    color: #ffcf6f;
    font-size: 17px;
    font-weight: bold;
    letter-spacing: 1px;
}

.timer {
    text-align: right;
}

.progress-track {
    height: 14px;
    border: 1px solid rgba(255, 75, 81, 0.7);
    background: rgba(17, 11, 15, 0.88);
    box-shadow: inset 0 0 14px rgba(255, 70, 70, 0.16);
    overflow: hidden;
}

.progress-fill {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #ff2530, #ff8a1f);
    box-shadow: 0 0 16px rgba(255, 99, 31, 0.75);
    transform-origin: left center;
}

.play-field {
    flex: 0 0 min(660px, 61vh);
    width: min(1728px, 90vw);
    min-height: 0;
    margin: 0 auto;
    border: 2px solid rgba(255, 73, 79, 0.8);
    background: rgba(4, 7, 10, 0.58);
    box-shadow:
        inset 0 0 38px rgba(255, 60, 68, 0.08),
        0 0 22px rgba(255, 60, 68, 0.22);
    display: grid;
    grid-template-rows: 220px 235px;
    gap: 0;
    padding: 28px clamp(54px, 4.8vw, 92px) 48px;
    position: relative;
}

.settings,
.end-screen {
    position: absolute;
    inset: 0;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(2, 5, 8, 0.9);
    backdrop-filter: blur(4px);
}

.panel {
    width: min(620px, 92vw);
    padding: 34px;
    border: 2px solid rgba(255, 80, 86, 0.85);
    background: linear-gradient(180deg, rgba(18, 10, 13, 0.96), rgba(7, 10, 14, 0.96));
    box-shadow: 0 0 28px rgba(255, 70, 75, 0.28);
    text-align: center;
}

.panel-title {
    color: #ff767c;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 2px;
    margin-bottom: 18px;
}

.config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin: 24px 0;
}

.config-group {
    text-align: left;
    color: #9ec4d8;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 1px;
}

.config-heading {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
}

.config-value {
    color: #ffcf6f;
    text-shadow: 0 0 8px rgba(255, 207, 111, 0.36);
}

.config-group input[type="range"] {
    width: 100%;
    accent-color: #ff7a2f;
    cursor: pointer;
}

.config-scale {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    color: #617f91;
    font-size: 11px;
}

.target-zone {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
}

.target-track {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: clamp(26px, 3.1vw, 58px);
    overflow-x: auto;
    padding: 12px clamp(10px, 2.8vw, 52px) 18px;
}

.target-wrap {
    position: relative;
    display: grid;
    gap: 6px;
    justify-items: center;
    flex: 0 0 auto;
}

.card-label {
    color: #8da9b9;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 1px;
    text-shadow: 0 0 8px rgba(108, 255, 156, 0.18);
}

.target-wrap.solved .card-label {
    color: #6cff9c;
}

.target-wrap.current .card-label {
    color: #ff767c;
}

.target-check {
    position: absolute;
    right: -5px;
    top: 21px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: #62ff91;
    color: #03110a;
    font-size: 16px;
    font-weight: bold;
    box-shadow: 0 0 14px rgba(98, 255, 145, 0.82);
}

.answers {
    width: min(1120px, 72%);
    margin: 4px auto 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(52px, 5vw, 94px);
    align-items: end;
    justify-items: center;
}

.answer-slot {
    display: grid;
    gap: 10px;
    justify-items: center;
}

.answer-label {
    color: #a7c4d6;
    font-size: 18px;
    font-weight: bold;
}

.pattern-card {
    width: 112px;
    height: 178px;
    padding: 16px 15px;
    border: 2px solid #486173;
    border-radius: 8px;
    background: rgba(9, 24, 34, 0.82);
    box-shadow:
        0 0 14px rgba(85, 120, 145, 0.26),
        inset 0 0 14px rgba(255, 255, 255, 0.035);
    display: grid;
    grid-template-columns: repeat(3, 19px);
    grid-template-rows: repeat(6, 19px);
    gap: 7px 9px;
    justify-content: center;
    align-content: center;
    overflow: hidden;
    cursor: pointer;
    transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
}

.target-card {
    cursor: default;
}

.target-card.solved {
    border-color: #26bb6a;
    box-shadow:
        0 0 18px rgba(38, 187, 106, 0.52),
        inset 0 0 16px rgba(38, 187, 106, 0.08);
}

.target-card.current {
    transform: scale(1.12);
    border-color: #ff4b51;
    box-shadow:
        0 0 24px rgba(255, 75, 81, 0.75),
        inset 0 0 18px rgba(255, 75, 81, 0.12);
}

.target-card.pending {
    opacity: 0.22;
    border-color: rgba(120, 145, 160, 0.28);
    filter: grayscale(1) blur(0.7px);
    box-shadow:
        0 0 10px rgba(120, 145, 160, 0.12),
        inset 0 0 14px rgba(255, 255, 255, 0.025);
}

.pattern-card:not(.target-card):hover,
.pattern-card.selected {
    transform: translateY(-4px);
    border-color: #ff9d34;
    box-shadow:
        0 0 20px rgba(255, 157, 52, 0.62),
        inset 0 0 16px rgba(255, 157, 52, 0.08);
}

.pattern-card.correct {
    border-color: #62ff91;
    box-shadow:
        0 0 24px rgba(98, 255, 145, 0.75),
        inset 0 0 18px rgba(98, 255, 145, 0.12);
}

.pattern-card.wrong {
    border-color: #ff4b51;
    animation: wrongPulse 180ms linear 2;
    box-shadow:
        0 0 26px rgba(255, 75, 81, 0.75),
        inset 0 0 18px rgba(255, 75, 81, 0.12);
}

.dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #233a4d;
    box-shadow: inset 0 0 4px rgba(255, 255, 255, 0.08);
}

.dot.on {
    background: #ff9d34;
    box-shadow:
        0 0 8px rgba(255, 157, 52, 0.78),
        inset 0 0 5px rgba(255, 255, 255, 0.18);
}

.target-card.solved .dot.on {
    background: #43c97a;
    box-shadow:
        0 0 8px rgba(67, 201, 122, 0.78),
        inset 0 0 5px rgba(255, 255, 255, 0.18);
}

.target-card.current .dot.on {
    background: #ff5b5f;
    box-shadow:
        0 0 9px rgba(255, 91, 95, 0.82),
        inset 0 0 5px rgba(255, 255, 255, 0.18);
}

.target-card.pending .dot.on {
    background: rgba(111, 131, 145, 0.28);
    box-shadow: none;
}

.action-row {
    position: absolute;
    left: 50%;
    bottom: -126px;
    transform: translateX(-50%);
    display: grid;
    justify-items: center;
    gap: 24px;
    z-index: 2;
}

.enigma-hint {
    color: rgba(255, 207, 111, 0.62);
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 1.2px;
    text-align: center;
    text-shadow: 0 0 10px rgba(255, 133, 47, 0.18);
    white-space: nowrap;
}

button:not(.pattern-card) {
    border: 2px solid #ff7646;
    background: linear-gradient(90deg, rgba(185, 37, 43, 0.92), rgba(214, 93, 28, 0.92));
    color: #ffd9bd;
    padding: 18px 58px;
    font-family: "Courier New", monospace;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 0 18px rgba(255, 93, 45, 0.38);
}

button:not(.pattern-card):disabled {
    opacity: 0.48;
    cursor: not-allowed;
}

.status-line {
    min-height: 24px;
    color: #ffcf6f;
    text-align: center;
    font-weight: bold;
    letter-spacing: 1px;
}

.hidden {
    display: none;
}

@keyframes wrongPulse {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-3px); }
    100% { transform: translateX(0); }
}

@media (max-width: 1100px) {
    body { overflow: auto; }
    .enigma-shell { height: auto; min-height: 100vh; padding: 20px; }
    .hud { grid-template-columns: 1fr; }
    .timer { text-align: left; }
    .play-field { width: 100%; height: auto; flex-basis: auto; grid-template-rows: auto auto; padding: 18px 18px 72px; }
    .target-track { justify-content: flex-start; }
    .answers { width: min(680px, 100%); grid-template-columns: repeat(2, minmax(120px, 1fr)); gap: 22px; }
    .action-row { position: static; transform: none; margin-top: 22px; }
    .enigma-hint { white-space: normal; max-width: 90vw; }
    .pattern-card { width: 92px; height: 142px; padding: 12px; grid-template-columns: repeat(3, 16px); grid-template-rows: repeat(6, 16px); gap: 5px 8px; }
    .dot { width: 15px; height: 15px; }
    .config-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="enigma-shell">
    <header class="top-bar">
        <h1>CODIGOS ENIGMA</h1>
        <a class="menu-link" href="index.html">MENU</a>
    </header>

    <section class="hud">
        <div id="roundInfo" class="hud-value">TARJETA 00/00</div>
        <div class="progress-track"><div id="timeBar" class="progress-fill"></div></div>
        <div id="timerText" class="hud-value timer">15.0S</div>
    </section>

    <main class="play-field">
        <section id="settingsScreen" class="settings">
            <div class="panel">
                <div class="panel-title">CONFIGURAR DESCIFRADO</div>
                <div class="status-line">Selecciona dificultad del protocolo</div>
                <div class="config-grid">
                    <label class="config-group">
                        <span class="config-heading">
                            <span>NUMERO DE TARJETAS</span>
                            <span id="cardsValue" class="config-value">7</span>
                        </span>
                        <input id="cardsInput" type="range" min="1" max="20" value="7" step="1">
                        <span class="config-scale"><span>1</span><span>20</span></span>
                    </label>
                    <label class="config-group">
                        <span class="config-heading">
                            <span>SEGUNDOS TOTALES</span>
                            <span id="secondsValue" class="config-value">15S</span>
                        </span>
                        <input id="secondsInput" type="range" min="5" max="120" value="15" step="1">
                        <span class="config-scale"><span>5S</span><span>120S</span></span>
                    </label>
                </div>
                <button id="startBtn">INICIAR SECUENCIA</button>
            </div>
        </section>

        <section id="endScreen" class="end-screen hidden">
            <div class="panel">
                <div id="endTitle" class="panel-title">DESCIFRADO</div>
                <div id="endMessage" class="status-line"></div>
                <button id="restartBtn">NUEVA SECUENCIA</button>
            </div>
        </section>

        <section class="target-zone">
            <div id="targetTrack" class="target-track" aria-label="Tarjetas objetivo"></div>
        </section>

        <section id="answers" class="answers" aria-label="Opciones de respuesta"></section>

        <section>
            <div class="action-row">
                <button id="decipherBtn" disabled>DESCIFRAR SECUENCIA</button>
                <div class="enigma-hint">EL TRUCO ES COMPARAR SOLO LA PARTE SUPERIOR DE LAS TARJETAS 2-3 PRIMERAS FILAS</div>
            </div>
        </section>
    </main>
</div>

<script>
const TOTAL_DOTS = 18;
const DEFAULT_CARDS = 7;
const DEFAULT_SECONDS = 15;
const OPTION_LABELS = ["A", "B", "C", "D"];

const settingsScreen = document.getElementById("settingsScreen");
const endScreen = document.getElementById("endScreen");
const endTitle = document.getElementById("endTitle");
const endMessage = document.getElementById("endMessage");
const cardsInput = document.getElementById("cardsInput");
const secondsInput = document.getElementById("secondsInput");
const cardsValue = document.getElementById("cardsValue");
const secondsValue = document.getElementById("secondsValue");
const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");
const roundInfo = document.getElementById("roundInfo");
const timerText = document.getElementById("timerText");
const timeBar = document.getElementById("timeBar");
const targetTrack = document.getElementById("targetTrack");
const answers = document.getElementById("answers");
const decipherBtn = document.getElementById("decipherBtn");

let totalCards = DEFAULT_CARDS;
let totalSeconds = DEFAULT_SECONDS;
let currentRound = 0;
let targetPatterns = [];
let currentTarget = [];
let options = [];
let correctIndex = 0;
let selectedIndex = null;
let startedAt = 0;
let timerId = null;
let locked = false;
let audioContext = null;

function clampNumber(value, min, max, fallback) {
    const number = Number(value);
    if (!Number.isFinite(number)) {
        return fallback;
    }
    return Math.min(Math.max(Math.floor(number), min), max);
}

function patternKey(pattern) {
    return pattern.map(Boolean).map(value => value ? "1" : "0").join("");
}

function createPattern() {
    const activeCount = 6 + Math.floor(Math.random() * 6);
    const positions = Array.from({ length: TOTAL_DOTS }, (_, index) => index);

    for (let i = positions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [positions[i], positions[j]] = [positions[j], positions[i]];
    }

    const active = new Set(positions.slice(0, activeCount));
    return Array.from({ length: TOTAL_DOTS }, (_, index) => active.has(index));
}

function createRandomDistinctPattern(keys) {
    let candidate = createPattern();

    while (keys.has(patternKey(candidate))) {
        candidate = createPattern();
    }

    return candidate;
}

function createOptions(target) {
    const result = [];
    const keys = new Set();
    correctIndex = Math.floor(Math.random() * 4);

    for (let i = 0; i < 4; i++) {
        if (i === correctIndex) {
            result[i] = [...target];
            keys.add(patternKey(target));
            continue;
        }

        let candidate = createRandomDistinctPattern(keys);
        result[i] = candidate;
        keys.add(patternKey(candidate));
    }

    return result;
}

function getAudioContext() {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;

    if (!AudioContextClass) {
        return null;
    }

    if (!audioContext) {
        audioContext = new AudioContextClass();
    }

    return audioContext;
}

function playBeep(type = "select") {
    const context = getAudioContext();

    if (!context) {
        return;
    }

    if (context.state === "suspended") {
        context.resume();
    }

    const settings = {
        select: { frequency: 520, duration: 0.055, gain: 0.035, wave: "sine" },
        correct: { frequency: 760, duration: 0.13, gain: 0.055, wave: "triangle" },
        error: { frequency: 170, duration: 0.16, gain: 0.06, wave: "square" },
        finish: { frequency: 980, duration: 0.22, gain: 0.055, wave: "triangle" }
    }[type];

    const oscillator = context.createOscillator();
    const gain = context.createGain();
    const now = context.currentTime;

    oscillator.type = settings.wave;
    oscillator.frequency.setValueAtTime(settings.frequency, now);
    gain.gain.setValueAtTime(0.001, now);
    gain.gain.exponentialRampToValueAtTime(settings.gain, now + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.001, now + settings.duration);

    oscillator.connect(gain);
    gain.connect(context.destination);
    oscillator.start(now);
    oscillator.stop(now + settings.duration + 0.02);
}

function renderPattern(container, pattern) {
    container.innerHTML = "";

    pattern.forEach(isActive => {
        const dot = document.createElement("span");
        dot.className = isActive ? "dot on" : "dot";
        container.appendChild(dot);
    });
}

function renderTargetTrack() {
    targetTrack.innerHTML = "";

    targetPatterns.forEach((pattern, index) => {
        const state =
            index < currentRound
                ? "solved"
                : index === currentRound
                    ? "current"
                    : "pending";

        const wrap = document.createElement("div");
        wrap.className = `target-wrap ${state}`;

        const label = document.createElement("div");
        label.className = "card-label";
        label.textContent = String(index + 1).padStart(2, "0");

        const card = document.createElement("div");
        card.className = `pattern-card target-card ${state}`;
        card.setAttribute("aria-label", `Tarjeta objetivo ${index + 1}`);
        renderPattern(card, pattern);

        wrap.appendChild(label);
        wrap.appendChild(card);

        if (state === "solved") {
            const check = document.createElement("div");
            check.className = "target-check";
            check.textContent = "✓";
            wrap.appendChild(check);
        }

        targetTrack.appendChild(wrap);
    });
}

function renderRound() {
    locked = false;
    selectedIndex = null;
    currentTarget = targetPatterns[currentRound];
    options = createOptions(currentTarget);

    roundInfo.textContent = `TARJETA ${String(currentRound + 1).padStart(2, "0")}/${String(totalCards).padStart(2, "0")}`;
    decipherBtn.disabled = true;

    renderTargetTrack();
    answers.innerHTML = "";

    options.forEach((pattern, index) => {
        const slot = document.createElement("div");
        slot.className = "answer-slot";

        const label = document.createElement("div");
        label.className = "answer-label";
        label.textContent = OPTION_LABELS[index];

        const card = document.createElement("button");
        card.type = "button";
        card.className = "pattern-card";
        card.setAttribute("aria-label", `Respuesta ${OPTION_LABELS[index]}`);
        card.addEventListener("click", () => selectOption(index));
        renderPattern(card, pattern);

        slot.appendChild(label);
        slot.appendChild(card);
        answers.appendChild(slot);
    });
}

function selectOption(index) {
    if (locked) {
        return;
    }

    selectedIndex = index;
    playBeep("select");
    [...answers.querySelectorAll(".pattern-card")].forEach((card, cardIndex) => {
        card.classList.toggle("selected", cardIndex === index);
        card.classList.remove("wrong", "correct");
    });
    decipherBtn.disabled = false;
}

function decipherSelected() {
    if (selectedIndex === null || locked) {
        return;
    }

    const cards = [...answers.querySelectorAll(".pattern-card")];
    const selectedCard = cards[selectedIndex];

    if (selectedIndex !== correctIndex) {
        selectedCard.classList.remove("wrong");
        void selectedCard.offsetWidth;
        selectedCard.classList.add("wrong");
        playBeep("error");
        setTimeout(() => finishGame(false, "DESCIFRADO FALLIDO"), 320);
        return;
    }

    locked = true;
    decipherBtn.disabled = true;
    selectedCard.classList.remove("selected");
    playBeep("correct");

    currentRound++;

    if (currentRound >= totalCards) {
        finishGame(true);
        return;
    }

    renderRound();
}

function updateTimer() {
    const elapsed = (performance.now() - startedAt) / 1000;
    const remaining = Math.max(totalSeconds - elapsed, 0);
    const ratio = totalSeconds === 0 ? 0 : remaining / totalSeconds;

    timerText.textContent = `${remaining.toFixed(1)}S`;
    timeBar.style.transform = `scaleX(${ratio})`;

    if (remaining <= 0) {
        finishGame(false);
    }
}

function startTimer() {
    clearInterval(timerId);
    startedAt = performance.now();
    updateTimer();
    timerId = setInterval(updateTimer, 80);
}

function finishGame(victory, title = null) {
    clearInterval(timerId);
    locked = true;
    decipherBtn.disabled = true;
    endScreen.classList.remove("hidden");
    playBeep(victory ? "finish" : "error");
    endTitle.textContent = title || (victory ? "DESCIFRADO" : "TIEMPO AGOTADO");
    endTitle.style.color = victory ? "#62ff91" : "#ff767c";
    endMessage.textContent = victory
        ? `${totalCards}/${totalCards} tarjetas resueltas`
        : `${currentRound}/${totalCards} tarjetas resueltas`;
}

function updateConfigLabels() {
    cardsValue.textContent = cardsInput.value;
    secondsValue.textContent = `${secondsInput.value}S`;
}

function startGame() {
    playBeep("select");
    totalCards = clampNumber(cardsInput.value, 1, 20, DEFAULT_CARDS);
    totalSeconds = clampNumber(secondsInput.value, 5, 120, DEFAULT_SECONDS);
    cardsInput.value = totalCards;
    secondsInput.value = totalSeconds;

    currentRound = 0;
    targetPatterns = Array.from({ length: totalCards }, () => createPattern());
    settingsScreen.classList.add("hidden");
    endScreen.classList.add("hidden");
    renderRound();
    startTimer();
}

cardsInput.addEventListener("input", updateConfigLabels);
secondsInput.addEventListener("input", updateConfigLabels);
startBtn.addEventListener("click", startGame);
restartBtn.addEventListener("click", () => {
    endScreen.classList.add("hidden");
    settingsScreen.classList.remove("hidden");
    timeBar.style.transform = "scaleX(1)";
    timerText.textContent = `${DEFAULT_SECONDS}.0S`;
});
decipherBtn.addEventListener("click", decipherSelected);

updateConfigLabels();
targetPatterns = Array.from({ length: DEFAULT_CARDS }, () => createPattern());
renderTargetTrack();
</script>
</body>
</html>
