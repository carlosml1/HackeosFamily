<!DOCTYPE html>
<html lang='es'>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>Cypher Constraints</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #06111a;
            color: #d9ecff;
            font-family: Consolas, monospace
        }

        .terminal {
            width: 98%;
            margin: 15px auto;
            border: 1px solid #1c8fe8;
            padding: 20px;
            min-height: 95vh
        }

        .topbar {
            display: flex;
            justify-content: space-between
        }

        .status {
            color: #7fc9ff
        }

        .buttons button {
            margin-left: 8px;
            background: #071723;
            border: 1px solid #2c8de0;
            color: #fff;
            padding: 8px
        }

        .game {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            border: 1px solid #1c8fe8;
            padding: 20px;
            margin-top: 20px
        }

        .hud {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px
        }

        .players {
            display: flex;
            justify-content: space-around
        }

        .player {
            text-align: center
        }

        .num {
            font-size: 42px;
            margin: 10px
        }

        .player button {
            width: 40px;
            height: 40px
        }

        .panel {
            border-left: 1px solid #1c8fe8;
            padding-left: 20px
        }

        .clue {
            border-bottom: 1px solid #2c8de0;
            padding: 10px 0
        }

        #lock {
            width: 100%;
            padding: 12px;
            margin-top: 20px
        }

        .footer {
            margin-top: 20px
        }

        #timeBar {
            height: 12px;
            background: #2b1705;
            border: 1px solid #ff8a2a
        }

        #timeFill {
            height: 100%;
            width: 100%;
            background: #ff8a2a
        }

        .info {
            display: flex;
            justify-content: space-between;
            margin-top: 10px
        }
    </style>
</head>

<body>
    <div class='terminal'>
        <div class='topbar'>
            <div class='status'>● LAFAUNA_OS</div>
            <div class='buttons'><button>CYPHER_CONSTRAINTS</button><button>LIVE</button><button
                    onclick='history.back()'>←</button></div>
        </div>
        <div class='game'>
            <div>
                <div class='hud'>
                    <div>ROUND <span id='round'>1</span>/3</div>
                    <div>LIVES <span id='lives'>●●●</span></div>
                </div>
                <div class='players' id='players'></div>
            </div>
            <div class='panel'>
                <h2>TU PISTA</h2>
                <div class='clue'><b>Jugador 4</b><br>La suma es 20.</div>
                <div class='clue'><b>Jugador 1</b><br>d1>d2.</div>
                <div class='clue'><b>Jugador 2</b><br>d2+d3=11.</div>
                <div class='clue'><b>Jugador 3</b><br>d4 es impar.</div><button id='lock'>LOCK</button>
                <div id='msg'></div>
            </div>
        </div>
        <div class='footer'>
            <div id='timeBar'>
                <div id='timeFill'></div>
            </div>
            <div class='info'>
                <div>ZOOM:CYPHER_ROOM</div>
                <div>V1.0</div>
            </div>
        </div>
    </div>
    <script>

        const games = [
            { pin: [1, 4, 7, 2], clues: [{ player: 1, text: "#1<#2." }, { player: 2, text: "#2+#3=11." }, { player: 3, text: "#4 es par." }, { player: 4, text: "La suma es 14." }] },
            { pin: [8, 3, 2, 9], clues: [{ player: 1, text: "#1>#2." }, { player: 2, text: "#2+#3=5." }, { player: 3, text: "#4 es impar." }, { player: 4, text: "La suma es 22." }] },
            { pin: [5, 5, 4, 6], clues: [{ player: 1, text: "#1=#2." }, { player: 2, text: "#2+#3=9." }, { player: 3, text: "#4 es par." }, { player: 4, text: "La suma es 20." }] },
            { pin: [7, 1, 8, 4], clues: [{ player: 1, text: "#1>#2." }, { player: 2, text: "#2+#3=9." }, { player: 3, text: "#4 es par." }, { player: 4, text: "La suma es 20." }] },
            { pin: [2, 6, 5, 3], clues: [{ player: 1, text: "#1<#2." }, { player: 2, text: "#2+#3=11." }, { player: 3, text: "#4 es impar." }, { player: 4, text: "La suma es 16." }] },
            { pin: [9, 4, 1, 8], clues: [{ player: 1, text: "#1>#2." }, { player: 2, text: "#2+#3=5." }, { player: 3, text: "#4 es par." }, { player: 4, text: "La suma es 22." }] },
            { pin: [3, 3, 9, 7], clues: [{ player: 1, text: "#1=#2." }, { player: 2, text: "#2+#3=12." }, { player: 3, text: "#4 es impar." }, { player: 4, text: "La suma es 22." }] },
            { pin: [6, 2, 4, 5], clues: [{ player: 1, text: "#1>#2." }, { player: 2, text: "#2+#3=6." }, { player: 3, text: "#4 es impar." }, { player: 4, text: "La suma es 17." }] },
            { pin: [0, 8, 6, 1], clues: [{ player: 1, text: "#1<#2." }, { player: 2, text: "#2+#3=14." }, { player: 3, text: "#4 es impar." }, { player: 4, text: "La suma es 15." }] },
            { pin: [4, 9, 0, 2], clues: [{ player: 1, text: "#1<#2." }, { player: 2, text: "#2+#3=9." }, { player: 3, text: "#4 es par." }, { player: 4, text: "La suma es 15." }] },
            { pin: [8, 8, 1, 3], clues: [{ player: 1, text: "#1=#2." }, { player: 2, text: "#2+#3=9." }, { player: 3, text: "#4 es impar." }, { player: 4, text: "La suma es 20." }] },
            { pin: [5, 2, 7, 4], clues: [{ player: 1, text: "#1>#2." }, { player: 2, text: "#2+#3=9." }, { player: 3, text: "#4 es par." }, { player: 4, text: "La suma es 18." }] },
            { pin: [1, 7, 3, 9], clues: [{ player: 1, text: "#1<#2." }, { player: 2, text: "#2+#3=10." }, { player: 3, text: "#4 es impar." }, { player: 4, text: "La suma es 20." }] },
            { pin: [6, 6, 2, 0], clues: [{ player: 1, text: "#1=#2." }, { player: 2, text: "#2+#3=8." }, { player: 3, text: "#4 es par." }, { player: 4, text: "La suma es 14." }] },
            { pin: [9, 1, 5, 7], clues: [{ player: 1, text: "#1>#2." }, { player: 2, text: "#2+#3=6." }, { player: 3, text: "#4 es impar." }, { player: 4, text: "La suma es 22." }] },
            { pin: [2, 5, 8, 6], clues: [{ player: 1, text: "#1<#2." }, { player: 2, text: "#2+#3=13." }, { player: 3, text: "#4 es par." }, { player: 4, text: "La suma es 21." }] },
            { pin: [7, 4, 0, 1], clues: [{ player: 1, text: "#1>#2." }, { player: 2, text: "#2+#3=4." }, { player: 3, text: "#4 es impar." }, { player: 4, text: "La suma es 12." }] },
            { pin: [3, 8, 5, 2], clues: [{ player: 1, text: "#1<#2." }, { player: 2, text: "#2+#3=13." }, { player: 3, text: "#4 es par." }, { player: 4, text: "La suma es 18." }] },
            { pin: [4, 4, 4, 9], clues: [{ player: 1, text: "#1=#2." }, { player: 2, text: "#2+#3=8." }, { player: 3, text: "#4 es impar." }, { player: 4, text: "La suma es 21." }] },
            { pin: [8, 0, 7, 5], clues: [{ player: 1, text: "#1>#2." }, { player: 2, text: "#2+#3=7." }, { player: 3, text: "#4 es impar." }, { player: 4, text: "La suma es 20." }] },
            { pin: [5, 9, 2, 4], clues: [{ player: 1, text: "#1<#2." }, { player: 2, text: "#2+#3=11." }, { player: 3, text: "#4 es par." }, { player: 4, text: "La suma es 20." }] },
            { pin: [6, 3, 6, 8], clues: [{ player: 1, text: "#1>#2." }, { player: 2, text: "#2+#3=9." }, { player: 3, text: "#4 es par." }, { player: 4, text: "La suma es 23." }] },
            { pin: [1, 2, 9, 0], clues: [{ player: 1, text: "#1<#2." }, { player: 2, text: "#2+#3=11." }, { player: 3, text: "#4 es par." }, { player: 4, text: "La suma es 12." }] },
            { pin: [9, 7, 1, 6], clues: [{ player: 1, text: "#1>#2." }, { player: 2, text: "#2+#3=8." }, { player: 3, text: "#4 es par." }, { player: 4, text: "La suma es 23." }] },
            { pin: [2, 2, 8, 7], clues: [{ player: 1, text: "#1=#2." }, { player: 2, text: "#2+#3=10." }, { player: 3, text: "#4 es impar." }, { player: 4, text: "La suma es 19." }] }
        ];

        const game = games[Math.floor(Math.random() * games.length)];

        const secret = game.pin;

        const clues = game.clues;

        const vals = [0, 0, 0, 0];
        let lives = 3;
        let round = 1;



        // Pintar pistas
        const panel = document.querySelector(".panel");

        panel.innerHTML = "<h2>TU PISTA</h2>";

        clues.forEach(c => {

            panel.innerHTML += `
        <div class="clue">
            <b>Jugador ${c.player}</b><br>
            ${c.text}
        </div>
    `;

        });

        panel.innerHTML += `
<button id="lock">LOCK</button>
<div id="msg"></div>
`;

        const p = document.getElementById("players");

        function draw() {

            p.innerHTML = "";

            vals.forEach((v, i) => {

                const d = document.createElement("div");

                d.className = "player";

                d.innerHTML = `
            <div>P${i + 1}</div>

            <button onclick="chg(${i},-1)">-</button>

            <div class="num">${v}</div>

            <button onclick="chg(${i},1)">+</button>
        `;

                p.appendChild(d);

            });

        }

        window.chg = (i, s) => {

            vals[i] = (vals[i] + s + 10) % 10;

            draw();

        };

        draw();

        let currentGame = game;

        function loadGame() {

            currentGame = games[Math.floor(Math.random() * games.length)];

            secret.length = 0;
            currentGame.pin.forEach(n => secret.push(n));

            panel.innerHTML = "<h2>TU PISTA</h2>";

            currentGame.clues.forEach(c => {
                panel.innerHTML += `
        <div class="clue">
            <b>Jugador ${c.player}</b><br>
            ${c.text}
        </div>`;
            });

            panel.innerHTML += `
    <button id="lock">LOCK</button>
    <div id="msg"></div>`;

            vals.fill(0);
            draw();

            document.getElementById("lock").onclick = checkPin;
        }

        function checkPin() {

            if (vals.join() == secret.join()) {

                round++;

                if (round > 3) {

                    document.getElementById("round").textContent = "3";

                    document.getElementById("msg").innerHTML =
                        '<span style="color:#63ff96;font-size:20px;">✔ MISIÓN COMPLETADA</span>';

                    document.getElementById("lock").disabled = true;

                    return;
                }

                document.getElementById("round").textContent = round;

                document.getElementById("msg").innerHTML =
                    '<span style="color:#63ff96">Ronda superada</span>';

                setTimeout(loadGame, 1200);

            } else {

                lives--;

                document.getElementById("lives").textContent = "●".repeat(Math.max(0, lives));

                document.getElementById("msg").innerHTML =
                    lives > 0
                        ? "PIN incorrecto"
                        : '<span style="color:#f66">ACCESS DENIED</span>';

                if (lives <= 0)
                    document.getElementById("lock").disabled = true;
            }
        }

        document.getElementById("lock").onclick = checkPin;
        // Temporizador
        const total = 150;
        const start = performance.now();
        const fill = document.getElementById("timeFill");

        (function timer() {

            let r = Math.max(0, total - (performance.now() - start) / 1000);

            fill.style.width = (r / total * 100) + "%";

            if (r > 0 && lives > 0)
                requestAnimationFrame(timer);

        })();    
    </script>
</body>

</html>
